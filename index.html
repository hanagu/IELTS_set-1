<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabulary Flashcards Set 1 (1-100)</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Load Inter Font & Noto Sans KR */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
        }

        /* 3D Flip Effect Styles */
        .card-container {
            perspective: 1000px;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .card-container.is-flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front,
        .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden; /* Safari */
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 1.5rem;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            padding: 2rem;
        }

        .card-front {
            background-color: white;
            color: #1F2937; /* gray-800 */
            border: 2px solid #E5E7EB;
        }

        .card-back {
            background-color: #2563EB; /* Blue-600 */
            color: white;
            transform: rotateY(180deg);
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col justify-center items-center p-4">

    <div class="w-full max-w-lg mx-auto">

        <!-- Flashcard Container -->
        <div id="flashcard-container" class="card-container w-full h-96 rounded-3xl cursor-pointer">

                <!-- Card Front: English Word + IPA -->
                <div class="card-front">
                    <div class="text-center">

                        <!-- Word -->
                        <h2 id="front-word" class="text-4xl md:text-5xl font-extrabold text-slate-800 break-words mb-2">
                            Ability
                        </h2>
                        <!-- Pronunciation (IPA) -->
                        <p id="front-ipa" class="text-xl text-slate-500 font-serif italic">
                            /əˈbɪləti/
                        </p>
                        <p class="text-gray-400 mt-8 text-sm animate-pulse">
                            (Tap to flip)
                        </p>
                    </div>
                </div>

                <!-- Card Back: Meaning + Sentence + Translation -->
                <div class="card-back">
                    <div class="text-center w-full h-full flex flex-col justify-center items-center space-y-4">
                        
                        <!-- Korean Meaning -->
                        <div class="w-full border-b border-blue-400 pb-4 mb-2">

                        <div class="w-full px-2">
                            <p id="back-sentence" class="text-lg md:text-xl font-medium text-blue-100 italic">
                                She has the ability to do the job.
                            </p>
                        </div>

                        <!-- Korean Translation -->
                        <div class="w-full px-2">
                            <p id="back-translation" class="text-sm text-blue-200">
                                그녀는 그 일을 할 능력이 있다.
                            </p>
                        </div>

                    </div>
                </div>
            </div>
        </div>

        <!-- Card Counter -->
        <div id="card-counter" class="text-center text-slate-500 mt-6 text-lg font-medium">
            Card 1 / 100
        </div>

        <!-- Navigation Buttons -->
        <div class="flex justify-between mt-6 space-x-4 w-full">
            <button id="prev-btn" class="flex-1 bg-white hover:bg-slate-50 text-slate-800 font-bold py-3 px-6 rounded-xl shadow-sm border border-slate-200 transition-colors duration-200">
                &larr; Previous
            </button>
            <button id="next-btn" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl shadow-md transition-colors duration-200">
                Next &rarr;
            </button>
        </div>

        <!-- Shuffle Button -->
        <div class="mt-4 w-full">
            <button id="shuffle-btn" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-6 rounded-xl shadow-md transition-colors duration-200 flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
                Shuffle Cards
            </button>
        </div>
    </div>

            { word: "Commit", ipa: "/kəˈmɪt/", meaning: "저지르다, 약속하다", sentence: "He committed a serious crime.", translation: "그는 심각한 범죄를 저질렀다." },
            { word: "Communicate", ipa: "/kəˈmjuːnɪkeɪt/", meaning: "의사소통하다", sentence: "We communicate by email.", translation: "우리는 이메일로 의사소통한다." },
            { word: "Community", ipa: "/kəˈmjuːnɪti/", meaning: "공동체, 지역사회", sentence: "He is a respected member of the community.", translation: "그는 지역사회에서 존경받는 일원이다." },
            { word: "Compatible", ipa: "/kəmˈpætəbᵊl/", meaning: "호환되는, 양립할 수 있는", sentence: "This software is not compatible with my computer.", translation: "이 소프트웨어는 내 컴퓨터와 호환되지 않는다." },
            { word: "Compensate", ipa: "/ˈkɒmpɛnseɪt/", meaning: "보상하다", sentence: "Nothing can compensate for the loss of a child.", translation: "어떤 것도 아이를 잃은 슬픔을 보상할 수 없다." },
            { word: "Compile", ipa: "/kəmˈpaɪl/", meaning: "엮다, 편집하다", sentence: "We compiled a list of potential customers.", translation: "우리는 잠재 고객 목록을 작성했다." },
            { word: "Complement", ipa: "/ˈkɒmplɪmɛnt/", meaning: "보완하다", sentence: "The wine complements the meal perfectly.", translation: "그 와인은 식사를 완벽하게 보완한다." },
            { word: "Complex", ipa: "/ˈkɒmplɛks/", meaning: "복잡한", sentence: "The human brain is a complex organ.", translation: "인간의 뇌는 복잡한 기관이다." },
            { word: "Component", ipa: "/kəmˈpəʊnənt/", meaning: "구성 요소, 부품", sentence: "Trust is a key component of any relationship.", translation: "신뢰는 모든 관계의 핵심 요소이다." },
            { word: "Compound", ipa: "/ˈkɒmpaʊnd/", meaning: "화합물, 혼합하다", sentence: "Water is a compound of hydrogen and oxygen.", translation: "물은 수소와 산소의 화합물이다." },
            { word: "Comprehensive", ipa: "/ˌkɒmprɪˈhɛnsɪv/", meaning: "포괄적인, 종합적인", sentence: "They conducted a comprehensive study.", translation: "그들은 포괄적인 연구를 수행했다." },
            { word: "Comprise", ipa: "/kəmˈpraɪz/", meaning: "구성하다, 차지하다", sentence: "The team comprises five members.", translation: "그 팀은 다섯 명의 멤버로 구성된다." },
            { word: "Compute", ipa: "/kəmˈpjuːt/", meaning: "계산하다, 산출하다", sentence: "The software computes the final score.", translation: "그 소프트웨어는 최종 점수를 계산한다." },
            { word: "Concentrate", ipa: "/ˈkɒnsntreɪt/", meaning: "집중하다", sentence: "I can't concentrate with all that noise.", translation: "저 소음 때문에 집중할 수가 없다." },
            { word: "Concept", ipa: "/ˈkɒnsɛpt/", meaning: "개념", sentence: "She struggled to understand the concept.", translation: "그녀는 그 개념을 이해하는 데 애를 먹었다." },
            { word: "Conclude", ipa: "/kənˈkluːd/", meaning: "결론짓다, 끝내다", sentence: "The meeting concluded at 5 p.m.", translation: "회의는 오후 5시에 끝났다." },
            { word: "Concurrent", ipa: "/kənˈkʌrənt/", meaning: "동시에 발생하는", sentence: "There are three concurrent art exhibitions.", translation: "세 개의 미술 전시회가 동시에 열리고 있다." },
            { word: "Conduct", ipa: "/ˈkɒndʌkt/", meaning: "수행하다, 지휘하다", sentence: "They conducted a survey on eating habits.", translation: "그들은 식습관에 대한 설문조사를 수행했다." },
            { word: "Confer", ipa: "/kənˈfɜː/", meaning: "상의하다, 수여하다", sentence: "I need to confer with my lawyer.", translation: "나는 변호사와 상의해야 한다." },
            { word: "Confirm", ipa: "/kənˈfɜːm/", meaning: "확인하다, 확정하다", sentence: "Please confirm your reservation.", translation: "예약을 확인해 주세요." },
            { word: "Conflict", ipa: "/ˈkɒnflɪkt/", meaning: "갈등, 충돌", sentence: "There is a conflict between the two parties.", translation: "두 당사자 간에 갈등이 있다." },
            { word: "Consent", ipa: "/kənˈsɛnt/", meaning: "동의, 허락", sentence: "He gave his consent to the plan.", translation: "그는 그 계획에 동의했다." },
            { word: "Consequent", ipa: "/ˈkɒnsɪkwənt/", meaning: "결과로서 일어나는", sentence: "The heavy rain and consequent flooding caused damage.", translation: "폭우와 그로 인한 홍수가 피해를 입혔다." },
            { word: "Considerable", ipa: "/kənˈsɪdərəbᵊl/", meaning: "상당한", sentence: "We spent a considerable amount of time on this.", translation: "우리는 이것에 상당한 시간을 보냈다." },
            { word: "Consist", ipa: "/kənˈsɪst/", meaning: "구성되다", sentence: "The team consists of ten players.", translation: "그 팀은 10명의 선수로 구성된다." },
            { word: "Constant", ipa: "/ˈkɒnstənt/", meaning: "끊임없는, 일정한", sentence: "The machine makes a constant noise.", translation: "그 기계는 끊임없는 소음을 낸다." },
            { word: "Constitute", ipa: "/ˈkɒnstɪtjuːt/", meaning: "구성하다, 여겨지다", sentence: "Women constitute 50% of the workforce.", translation: "여성이 노동 인구의 50%를 구성한다." }
        ];

        let currentCardIndex = 0;
        let shuffledVocabulary = [...vocabulary]; // Clone the original array

        // Get DOM elements
        const cardContainer = document.getElementById('flashcard-container');
        const frontWordEl = document.getElementById('front-word');
        const frontIpaEl = document.getElementById('front-ipa'); // New IPA Element
        const backMeaningEl = document.getElementById('back-meaning');
        const backSentenceEl = document.getElementById('back-sentence');
        const backTranslationEl = document.getElementById('back-translation');
        const cardCounterEl = document.getElementById('card-counter');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const shuffleBtn = document.getElementById('shuffle-btn');

        // Function to load card content
        function loadCard(index) {
            if (index < 0 || index >= shuffledVocabulary.length) return;

            currentCardIndex = index;
            const cardData = shuffledVocabulary[index];

            // Update Card Front
            frontWordEl.textContent = cardData.word;
            frontIpaEl.textContent = cardData.ipa; // Set IPA

            // Update Card Back
            backMeaningEl.textContent = cardData.meaning;
            backSentenceEl.textContent = cardData.sentence;
            backTranslationEl.textContent = cardData.translation;

            // Update counter 
            cardCounterEl.textContent = `Card ${index + 1} / ${shuffledVocabulary.length}`;

            // Reset card to front face
            cardContainer.classList.remove('is-flipped');
        }

        // Function to flip card
        function flipCard() {
            cardContainer.classList.toggle('is-flipped');
        }

        // Show next card
        function nextCard() {
            const nextIndex = (currentCardIndex + 1) % shuffledVocabulary.length;
            loadCard(nextIndex);
        }

        // Show previous card
        function prevCard() {
            const prevIndex = (currentCardIndex - 1 + shuffledVocabulary.length) % shuffledVocabulary.length;
            loadCard(prevIndex);
        }

        // Shuffle cards (Fisher-Yates algorithm)
        function shuffleCards() {
            let m = shuffledVocabulary.length, t, i;
            while (m) {
                i = Math.floor(Math.random() * m--);
                t = shuffledVocabulary[m];
                shuffledVocabulary[m] = shuffledVocabulary[i];
                shuffledVocabulary[i] = t;
            }
            loadCard(0);
        }

        // Event Listeners
        cardContainer.addEventListener('click', flipCard);
        nextBtn.addEventListener('click', nextCard);
        prevBtn.addEventListener('click', prevCard);
        shuffleBtn.addEventListener('click', shuffleCards);

        // On page load, shuffle and display the first card
        shuffleCards();
        loadCard(0);
    </script>
